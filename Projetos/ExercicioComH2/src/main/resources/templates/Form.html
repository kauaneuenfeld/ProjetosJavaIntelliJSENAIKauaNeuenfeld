<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de pessoa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        label .required {
            color: #f44336;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #bbb;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .info-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
        }

        .info-box p {
            color: #667eea;
            font-size: 0.95rem;
            margin: 0;
            font-weight: 600;
        }

        .form-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="form-icon">
            <span th:if="${Usuarios.id == null}">➕</span>
            <span th:if="${Usuarios.id != null}">✏️</span>
        </div>
        <h1 th:text="${Usuarios.id != null} ? 'Editar pessoa' : 'Nova pessoa'">Nova Pessoa</h1>
        <p class="subtitle">Preencha os dados abaixo</p>
    </header>

    <div class="info-box" th:if="${Usuarios.id != null}">
        <p>💡 Você está editando: <strong th:text="${Usuarios.nome}">Nome</strong></p>
    </div>

    <form th:action="@{/salvar}" th:object="${Usuarios}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="nickname">
                Nickname <span class="required">*</span>
            </label>
            <input type="text"
                   th:fild="*{nickname}"
                   id="nickname"
                   placeholder="Digite o nickname completo"
                   required
                   autofocus>
        </div>
        <div class="form-group">
            <label for="email">
                Email <span class="required">*</span>
            </label>
            <input type="text"
            th:field="*{email}"
            id="email"
            placeholder="Digite seu email"
            min="0"
            max="150"
            autofocus>
        </div>

        <div class="form-group">
            <label for="jogoFavorito">
                Jogo Favorito <span class="required">*</span>
            </label>
            <input type="text"
            th:field="*{jogofavorito}"
            id="jogoFavorito"
            placeholder="Digite seu Jogo favorito"
            min="0"
            max="150"
            autofocus>
        </div>
        <div class="form-group">
            <label for="nivel">
                Nivel <span class="required">*</span>
            </label>
            <input type="number"
            th:field="*{nivel}"
            id="nivel"
            placeholder="Digite seu Jogo favorito"
            min="0"
            max="150"
            autofocus>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">
                <span th:text="${Usuarios.id != nill} ? '💾 Atualizar' : '💾 Salvar'">Salvar</span>
            </button>
            <a th:href="@{/Usuarios}" class="btn btn-secondary">❌ Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
